databases:
  - name: lexconnect-db
    plan: free
    databaseName: lexconnect
    user: lexadmin

services:
  - type: web
    name: lexconnect-web
    plan: free
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lexconnect-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.3"
