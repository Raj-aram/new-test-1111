services:
  - name: lexconnect-web
    type: web
    git:
      repository: github.com/Raj-aram/new-test-1111
      branch: main
    build:
      buildpack:
        build_command: pip install -r requirements.txt
    run:
      command: gunicorn app:app --bind 0.0.0.0:$PORT
    ports:
      - port: 8000
        protocol: http
    env:
      - key: DATABASE_URL
        scope: region
        type: secret
      - key: SECRET_KEY
        scope: region
        type: secret
      - key: PYTHON_VERSION
        value: "3.12"
    regions:
      - was
    scaling:
      min: 1
      max: 1
    health_checks:
      - path: /health
        port: 8000
        protocol: http
